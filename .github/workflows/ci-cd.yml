name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Run server unit tests + client lint + client build
  # ─────────────────────────────────────────────────────────
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Server unit tests
            dir: server
            cmd: node --test tests/*.test.js
          - name: Client lint
            dir: client
            cmd: npm run lint
          - name: Client build
            dir: client
            cmd: npm run build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm ci

      - name: ${{ matrix.name }}
        working-directory: ${{ matrix.dir }}
        run: ${{ matrix.cmd }}

  # ─────────────────────────────────────────────────────────
  # JOB 2: Start server, verify all API endpoints respond
  # ─────────────────────────────────────────────────────────
  health-check:
    name: API health checks
    runs-on: ubuntu-latest
    needs: test
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      DEMO_DB_HOST: ${{ secrets.DEMO_DB_HOST }}
      DEMO_DB_PORT: ${{ secrets.DEMO_DB_PORT }}
      DEMO_DB_USER: ${{ secrets.DEMO_DB_USER }}
      DEMO_DB_PASSWORD: ${{ secrets.DEMO_DB_PASSWORD }}
      DEMO_DB_NAME: ${{ secrets.DEMO_DB_NAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Start server
        working-directory: server
        env:
          PORT: 5000
          SESSION_SECRET: ci-test-secret
          ALLOWED_ORIGINS: http://localhost:5173
          NODE_ENV: test
          POSTGRES_SSL_REJECT_UNAUTHORIZED: 'false'
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node server.js &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "Server is up"; exit 0
            fi
            echo "Waiting... ($i/20)"; sleep 1
          done
          echo "Server failed to start"; exit 1

      - name: GET /health returns 200 with status ok
        run: |
          res=$(curl -sf http://localhost:5000/health)
          echo "$res"
          echo "$res" | grep -q '"status":"ok"'

      - name: GET /api returns 200 with message
        run: |
          res=$(curl -sf http://localhost:5000/api)
          echo "$res"
          echo "$res" | grep -q '"message"'

      - name: POST /api/query with bad body returns 400
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/query \
            -H "Content-Type: application/json" \
            -d '{"conversationId":"not-a-uuid"}')
          echo "Status: $code"
          [ "$code" = "400" ]

      - name: POST /api/query with valid UUID passes validation
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:5000/api/query \
            -H "Content-Type: application/json" \
            -d '{"question":"How many users?","conversationId":"123e4567-e89b-12d3-a456-426614174000"}')
          echo "Status: $code"
          [ "$code" != "400" ]

      - name: Connect to demo DB (skipped if DEMO_DB_HOST not set)
        if: ${{ env.DEMO_DB_HOST != '' }}
        run: |
          code=$(curl -s -o /tmp/connect-resp.txt -w "%{http_code}" \
            -c /tmp/ci-cookies.txt \
            -X POST http://localhost:5000/api/connect \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"$DEMO_DB_HOST\",\"port\":$DEMO_DB_PORT,\"user\":\"$DEMO_DB_USER\",\"password\":\"$DEMO_DB_PASSWORD\",\"database\":\"$DEMO_DB_NAME\",\"ssl\":true}")
          cat /tmp/connect-resp.txt
          echo "Status: $code"
          [ "$code" = "200" ]

      - name: DB health check (skipped if DEMO_DB_HOST not set)
        if: ${{ env.DEMO_DB_HOST != '' }}
        run: |
          res=$(curl -sf -b /tmp/ci-cookies.txt http://localhost:5000/health/db)
          echo "$res"
          echo "$res" | grep -q '"status"'

      - name: Live AI smoke test (skipped if OPENROUTER_API_KEY not set)
        if: ${{ env.OPENROUTER_API_KEY != '' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          res=$(curl -sf \
            -X POST http://localhost:5000/api/query \
            -H "Content-Type: application/json" \
            -d '{"question":"How many tables exist?","conversationId":"123e4567-e89b-12d3-a456-426614174000"}')
          echo "$res"
          echo "$res" | grep -qE '"sql"|"error"'

  # ─────────────────────────────────────────────────────────
  # JOB 3: Promote production branch (main push only)
  # Fast-forwards production to match main after CI passes.
  # Railway and Vercel watch production and deploy automatically
  # via their native GitHub integrations.
  # ─────────────────────────────────────────────────────────
  promote-to-production:
    name: Promote to production
    runs-on: ubuntu-latest
    needs: health-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward production to main
        run: git push origin HEAD:production
