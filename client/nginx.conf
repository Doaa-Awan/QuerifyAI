server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and DB requests to the backend service
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }

    location /db/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
    }

    location /health/ {
        proxy_pass http://server:5000;
    }

    # React SPA: serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
